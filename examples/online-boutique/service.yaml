tosca_definitions_version: tosca_2_0

description:

  An Online Boutique service for Kubernetes.

  The service comprises many interconnected microservices.

imports:

- url: profiles/applications/online-boutique.yaml
  namespace: boutique

service_template:

  inputs:
    kubernetes:
      type: boutique:ms:krm:KubernetesClient
      default:
        url: https://127.0.0.1:42493
        root-certificates: artifacts/pem/root-certificates.pem
        user-certificates: artifacts/pem/user-certificates.pem
        user-private-key: artifacts/pem/user-private-key.pem

  node_templates:

    frontend1:
      type: boutique:FrontendService
      properties:
        #label: frontendservice1
        label: { $boutique:ms:krm:kubernetes: [ { $get_input: [ kubernetes ] } ] }

    frontend2:
      type: boutique:FrontendService
      properties:
        label: frontendservice2

    checkout:
      type: boutique:CheckoutService
      requirements:
      - shipping: shipping1
      - shipping: shipping2

    shipping1:
      type: boutique:ShippingService
      properties:
        label: shippingservice1

    shipping2:
      type: boutique:ShippingService
      properties:
        label: shippingservice2
